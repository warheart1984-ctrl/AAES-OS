name: cori-alpha-upload

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cori-alpha-upload-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Validate CORI Alpha store
        run: corepack pnpm run cori:validate
        env:
          CORI_ALPHA_ROOT: ${{ github.workspace }}/.runtime/cori-alpha

      - name: Post-push governed upload
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: corepack pnpm run cori:push
        env:
          CORI_ALPHA_ROOT: ${{ github.workspace }}/.runtime/cori-alpha
          CORI_ALPHA_DROPBOX_ROOT: /team
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}

      - name: Post-tag governed release upload
        if: startsWith(github.ref, 'refs/tags/')
        run: corepack pnpm run cori:tag
        env:
          CORI_ALPHA_ROOT: ${{ github.workspace }}/.runtime/cori-alpha
          CORI_ALPHA_DROPBOX_ROOT: /team
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
