---
# Network Policies for AAES-OS cluster
# Ingress policies: allow only required inter-service communication
# Egress policies: restrict outbound to known services

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-api-netpol
  namespace: aaes-os
spec:
  podSelector:
    matchLabels:
      app: platform-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  # Allow ops-console to call platform-api
  - from:
    - podSelector:
        matchLabels:
          app: ops-console
    ports:
    - protocol: TCP
      port: 3000
  # Allow platform-web to call platform-api
  - from:
    - podSelector:
        matchLabels:
          app: platform-web
    ports:
    - protocol: TCP
      port: 3000
  # Kubelet probes
  - from:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          component: kubelet
    ports:
    - protocol: TCP
      port: 3000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow sovereign-control-plane
  - to:
    - podSelector:
        matchLabels:
          app: sovereign-control-plane
    ports:
    - protocol: TCP
      port: 3000
  # Allow uss-api
  - to:
    - podSelector:
        matchLabels:
          app: uss-api
    ports:
    - protocol: TCP
      port: 3000
  # Allow external HTTPS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

