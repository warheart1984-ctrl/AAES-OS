---
apiVersion: v1
kind: Service
metadata:
  name: ops-console
  namespace: aaes-os
  labels:
    app: ops-console
spec:
  type: ClusterIP
  selector:
    app: ops-console
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aaes-os
  namespace: aaes-os

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aaes-os
  namespace: aaes-os
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aaes-os
  namespace: aaes-os
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aaes-os
subjects:
- kind: ServiceAccount
  name: aaes-os
  namespace: aaes-os

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-api
  namespace: aaes-os
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: platform-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-web
  namespace: aaes-os
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: platform-web
