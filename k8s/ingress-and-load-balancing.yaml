---
# Ingress controller installation check:
# helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
# helm repo update
# helm install ingress-nginx ingress-nginx/ingress-nginx \
#   --namespace ingress-nginx --create-namespace

apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    name: ingress-nginx

---
# NGINX Ingress Controller (if not already installed)
# Apply this section if you haven't installed the ingress controller yet
apiVersion: helm.sh/v1
kind: Release
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  chart: ingress-nginx/ingress-nginx
  version: 4.10.0
  values:
    controller:
      service:
        type: LoadBalancer
        annotations:
          cloud.google.com/load-balancer-type: "External"  # GCP
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 5

---
# Ingress for AAES-OS Platform Services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aaes-os-ingress
  namespace: aaes-os
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod  # If using cert-manager
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"  # Requests per second
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.aaes-os.local
    - web.aaes-os.local
    - ops.aaes-os.local
    secretName: aaes-os-tls
  rules:
  # Platform API
  - host: api.aaes-os.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-api
            port:
              number: 80
  # Platform Web (Dashboard)
  - host: web.aaes-os.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-web
            port:
              number: 80
  # Ops Console (Telemetry)
  - host: ops.aaes-os.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ops-console
            port:
              number: 80

---
# TLS Certificate (if using cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aaes-os-cert
  namespace: aaes-os
spec:
  secretName: aaes-os-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - api.aaes-os.local
  - web.aaes-os.local
  - ops.aaes-os.local

---
# ClusterIssuer for Let's Encrypt (if using cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@aaes-os.local
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx

---
# Service Monitor for Prometheus (if using Prometheus)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: aaes-os-monitor
  namespace: aaes-os
spec:
  selector:
    matchLabels:
      monitoring: enabled
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
# Horizontal Pod Autoscaler (HPA) for Platform API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-api-hpa
  namespace: aaes-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
# HPA for Platform Web
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-web-hpa
  namespace: aaes-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---
# HPA for Ops Console
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ops-console-hpa
  namespace: aaes-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ops-console
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
