[package]
name = "nova-substrate"
version = "1.0.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
crc32fast = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = "1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
